<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santacroce Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: white;
            color: black;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: black;
            font-size: 1.2em;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo {
            font-size: 3em;
            font-weight: bold;
            margin: 0;
        }

        .tagline {
            font-size: 1.5em;
        }

        footer {
            padding: 10px 0;
            font-size: 0.8em;
        }

        .icon-bar a {
            display: inline-block;
            margin: 0 10px;
            color: black;
        }

        .icon-bar i {
            font-size: 1.5em;
        }

        .icon-bar {
            margin: 20px 0;
        }

        /* Existing styles modified as necessary */
    </style>
</head>

<body>
    <div class="container">
        <nav>
            <a href="/blog">Blog</a>
            <a href="/docs">Docs</a>
            <a href="/github">GitHub</a>
        </nav>

        <main>
            <h1 class="logo">Santacroce Tech</h1>
            <p class="tagline">Innovation in Blockchain Technology</p>
            <!-- The rest of your main content goes here -->
        </main>

        <footer>
            <div class="icon-bar">
                <!-- Social icons here -->
            </div>
            © 2024 Santacroce Tech - All rights reserved.
        </footer>
